# UR12e 主从机械臂遥操作 — 统一配置文件
# 切换主端设备: 改 device → ur12e | s570 | keyboard

device: "s570"

master:
  ip: "192.168.1.100"
  rtde_frequency: 600
  max_retries: 3
  retry_interval: 1.0

s570:
  usb_port: "/dev/ttyS7"
  active_arm: "right"                       # left | right
  enable_calibration: true                 # 启动时自动零点校准
  joint_mapping: [1, 2, 4, 5, 6, 7]       # S570→UR 关节索引，跳过 J3
  joint_direction: [-1, -1, -1, 1, 1, 1]     # 方向 ±1，实机标定后调整

keyboard:
  joint_step: 0.01

# ─── 从臂 ───────────────────────────────────────

slave:
  ip: "192.168.1.100"
  rtde_frequency: 600
  servoj_lookahead_time: 0.03
  servoj_gain: 100
  max_retries: 3
  retry_interval: 1.0

# ─── 安全控制 ────────────────────────────────────

control:
  frequency: 600
  max_joint_velocity: 1.2
  enable_velocity_limit: true
  enable_joint_limit: true
  joint_limits:
    j1: [-6.28, 6.28]
    j2: [-6.28, 6.28]
    j3: [-3.14, 3.14]
    j4: [-6.28, 6.28]
    j5: [-6.28, 6.28]
    j6: [-6.28, 6.28]

# ─── 滤波器 ─────────────────────────────────────

filter:
  enable: true
  alpha: 0.2

# ─── 主从映射 ────────────────────────────────────

mapper:
  scale: 1.0
  joint_offset: [0, 0, 0, 0, 0, 0]
